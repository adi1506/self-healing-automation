<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Registration Form</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .form-container { background: #fff; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); padding: 40px; max-width: 520px; width: 100%; }
        h2 { color: #1a1a2e; margin-bottom: 24px; font-size: 24px; text-align: center; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; color: #333; font-weight: 500; font-size: 14px; }
        input[type="text"], input[type="email"], input[type="tel"], input[type="number"], select, textarea {
            width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        textarea { resize: vertical; min-height: 80px; }
        .radio-group, .checkbox-group { display: flex; gap: 16px; align-items: center; margin-top: 4px; }
        .radio-group label, .checkbox-group label { font-weight: 400; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        button[type="submit"] {
            width: 100%; padding: 12px; background: #4f46e5; color: #fff; border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 8px;
        }
        button[type="submit"]:hover { background: #4338ca; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Registration Form</h2>
        <form id="registrationForm">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" placeholder="Enter first name" data-testid="first-name-input">
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" placeholder="Enter last name" data-testid="last-name-input">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter email address" data-testid="email-input">
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter phone number" data-testid="phone-input">
            </div>
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" placeholder="Enter age" data-testid="age-input">
            </div>
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender" data-testid="gender-select">
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="country">Country</label>
                <select id="country" name="country" data-testid="country-select">
                    <option value="">Select Country</option>
                    <option value="India">India</option>
                    <option value="USA">USA</option>
                    <option value="UK">UK</option>
                    <option value="Canada">Canada</option>
                    <option value="Australia">Australia</option>
                </select>
            </div>
            <div class="form-group">
                <label>Employment Status</label>
                <div class="radio-group">
                    <label><input type="radio" name="employment" value="Employed" data-testid="employment-employed"> Employed</label>
                    <label><input type="radio" name="employment" value="Unemployed" data-testid="employment-unemployed"> Unemployed</label>
                    <label><input type="radio" name="employment" value="Student" data-testid="employment-student"> Student</label>
                </div>
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <textarea id="address" name="address" placeholder="Enter your address" data-testid="address-textarea"></textarea>
            </div>
            <div class="form-group">
                <div class="checkbox-group">
                    <label><input type="checkbox" id="terms" name="terms" data-testid="terms-checkbox"> I agree to the Terms &amp; Conditions</label>
                </div>
            </div>
            <div class="form-group">
                <div class="checkbox-group">
                    <label><input type="checkbox" id="newsletter" name="newsletter" data-testid="newsletter-checkbox"> Subscribe to newsletter</label>
                </div>
            </div>
            <button type="submit" data-testid="submit-button">Register</button>
        </form>
    </div>
</body>
</html>
